# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Removes public port mappings (nginx-proxy-manager handles routing via the
# external "proxy" network). Internal services stay on the "internal" network.

services:
  db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: gentax
      POSTGRES_DB: gentax
    env_file: .env
    networks:
      - internal

  api:
    ports: !reset []
    environment:
      CORS_ORIGIN: "${CORS_ORIGIN}"
    networks:
      - proxy
      - internal

  web:
    ports: !reset []
    build:
      context: .
      args:
        VITE_API_URL: "https://gentax-api.redflox.com"
    networks:
      - proxy

  bot:
    networks:
      - internal

networks:
  internal: {}
  proxy:
    external: true
