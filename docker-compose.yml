version: "3.9"

services:
  db:
    container_name: gentax-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gentax
      POSTGRES_USER: gentax
      POSTGRES_PASSWORD: gentax
    volumes:
      - gentax_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gentax"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    container_name: gentax-api
    build: .
    command: /bin/api
    env_file: .env
    environment:
      CORS_ORIGIN: "http://localhost:${WEB_PORT:-3000}"
      BOOTSTRAP_SECRET: "${BOOTSTRAP_SECRET:-}"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - gentax_receipts:/data/receipts
    restart: unless-stopped

  web:
    container_name: gentax-web
    build: .
    command: /bin/web
    environment:
      WEB_PORT: "${WEB_PORT:-3000}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    container_name: gentax-bot
    build: .
    command: /bin/bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - gentax_receipts:/data/receipts
    restart: unless-stopped

volumes:
  gentax_pgdata:
  gentax_receipts:
